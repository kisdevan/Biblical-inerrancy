<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theological Spectrum Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .spectrum {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }
        .theory {
            width: 150px;
            height: 150px;
            background-color: #ffffff;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            line-height: 150px;
            font-size: 20px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Theological Spectrum Visualization</h1>
    <p>This visualization represents different theological viewpoints on the spectrum of biblical interpretation.</p>
    <div class="spectrum">
        <div class="theory">Liberal</div>
        <div class="theory">Moderate</div>
        <div class="theory">Conservative</div>
        <div class="theory">Fundamentalist</div>
    </div>
</body>
</html>
